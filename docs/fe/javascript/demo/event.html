<!DOCTYPE html>
<html lang="zh-Hans-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit" />
    <meta http-equiv="Cache-Control" content="no-siteapp" />
    <title>鼠标键盘事件</title>
    <style>
        .wrap {
            margin-bottom: 50px;
            border: 1px dashed #000;
            padding: 10px;
        }

        .box {
            width: 200px;
            height: 200px;
            border: 1px solid #000;
            background-color: #eee;
            display: inline-block;
            padding: 10px;
        }

        .box.active {
            background-color: lightblue;
        }

        .box * {
            pointer-events: none;
        }
    </style>
</head>

<body>


    <div class="wrap">
        <h4>#鼠标-bug1</h4>
        <p>
            <b>[bug]</b> 鼠标按下变蓝，抬起恢复。如果移出区域抬起无法恢复
        </p>
        <div class="box" id="bug1">
        </div>
        <script>

            document.getElementById("bug1").onmousedown = function (e) {
                e.target.classList.add("active")
            }
            document.getElementById("bug1").onmouseup = function (e) {
                e.target.classList.remove("active")
            }
        </script>



        <hr>
        <p> <b>[fix]</b> 将 onmouseup 挂在 window 并在 onmousedown 中注册即可</p>


        <div class="box" id="bug2">
        </div>
        <script>

            document.getElementById("bug2").onmousedown = function (e) {
                e.target.classList.add("active")
                window.onmouseup = function () {
                    // 这个 e 是 onmousedown 的闭包 e
                    e.target.classList.remove("active")

                    window.onmouseup = null;
                }
            }
        </script>
    </div>


    <div class="wrap">
        <h4>#键盘-bug2</h4>
        <p>
            键盘按下发出不同声音，要求只触发一次，而且可以同时触发
        </p>
        <p>F12 查看输出</p>
        <script>
            const keys = new Set();
            window.onkeydown = function (e) {
                if (keys.has(e.key)) {
                    return;
                }
                console.log('active', e.key)
                keys.add(e.key);
            }
            window.onkeyup = function (e) {
                keys.delete(e.key)
                console.log('stop', e.key)
            }
        </script>

    </div>

</body>

</html>
